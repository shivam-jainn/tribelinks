services:
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: tracker_clickhouse_prod
    ports:
      - "${CLICKHOUSE_PORT_HTTP:-8123}:8123" # HTTP interface
      - "${CLICKHOUSE_PORT_TCP:-9000}:9000" # Native TCP client
    environment:
      - CLICKHOUSE_DB=${CLICKHOUSE_DB:-tracker_analytics}
      - CLICKHOUSE_USER=${CLICKHOUSE_USER:-default}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-}
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    volumes:
      - clickhouse_data_prod:/var/lib/clickhouse
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: tracker_server_prod
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    environment:
      - PORT=${PORT:-3000}
      - CLICKHOUSE_URL=http://clickhouse:8123
      - CLICKHOUSE_DB=${CLICKHOUSE_DB:-tracker_analytics}
      - CLICKHOUSE_USER=${CLICKHOUSE_USER:-default}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-}
    depends_on:
      clickhouse:
        condition: service_healthy

volumes:
  clickhouse_data_prod:
